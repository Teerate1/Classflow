<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassFlow AI Safe - V2</title>
    <link rel="icon" type="image/png" href="icon1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { background: linear-gradient(135deg, #fef08a 0%, #fed7aa 50%, #fbcfe8 100%); font-family: 'Prompt', sans-serif; margin: 0; color: #475569; min-height: 100vh; padding-bottom: 80px; }
        .white-card { background: #ffffff; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .private-card { background: #1e293b; border-radius: 20px; border: 2px solid #f472b6; color: white; box-shadow: 0 10px 25px rgba(244,114,182,0.2); }
        .personal-card { background: #f0fdf4; border-radius: 20px; border: 2px solid #10b981; color: #064e3b; box-shadow: 0 10px 25px rgba(16,185,129,0.1); }
        .task-item { background: white; border-radius: 18px; margin-bottom: 12px; border: 1px solid #e2e8f0; transition: all 0.2s ease; padding: 16px; }
        .custom-check { appearance: none; width: 28px; height: 28px; border: 2.5px solid #cbd5e1; border-radius: 50%; cursor: pointer; background: white; flex-shrink: 0; position: relative; }
        .custom-check:checked { background: #22c55e; border-color: #22c55e; }
        .custom-check:checked::after { content: '✓'; color: white; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 16px; font-weight: bold; }
        .tab-btn { padding: 10px 20px; border-radius: 14px; font-size: 14px; font-weight: 500; background: rgba(255,255,255,0.7); color: #64748b; border: 1px solid transparent; }
        .tab-active { background: #475569; color: white; border-color: #475569; box-shadow: 0 4px 10px rgba(71,85,105,0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-white/50 px-4 py-4 shadow-sm">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="icon1.png" alt="Logo" class="w-9 h-9 object-contain rounded-lg shadow-sm" onerror="this.src='https://cdn-icons-png.flaticon.com/512/591/591844.png'">
                <div>
                    <h1 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-pink-500">ClassFlow.</h1>
                    <p id="user-display-small" class="text-[11px] text-slate-500 font-medium tracking-wider"></p>
                </div>
            </div>
            <button onclick="logout()" class="text-xs font-bold text-rose-500 border-2 border-rose-500 px-4 py-2 rounded-xl active:scale-95">LOGOUT</button>
        </div>
    </nav>

    <div class="max-w-xl mx-auto px-4 pt-8">
        <div class="flex gap-2 mb-4">
             <button onclick="switchForm('commu')" id="btn-form-commu" class="flex-1 py-2 text-xs font-bold rounded-lg bg-blue-500 text-white shadow-md">ประกาศห้อง</button>
             <button onclick="switchForm('personal')" id="btn-form-personal" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white text-emerald-600 border border-emerald-200">จดงานส่วนตัว</button>
             <button onclick="switchForm('private')" id="btn-form-private" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white text-pink-600 border border-pink-200">ส่งให้เพื่อน</button>
        </div>

        <div class="space-y-6 mb-8">
            <div id="form-commu" class="white-card p-6">
                <div class="flex items-center gap-2 mb-4 text-blue-600">
                    <span class="text-2xl">📢</span><h3 class="font-bold text-sm uppercase">ประกาศงานส่วนรวม</h3>
                </div>
                <input type="text" id="commu-input" class="w-full bg-slate-50 border-2 border-slate-100 focus:border-blue-300 rounded-xl p-4 text-[15px] mb-3 outline-none" placeholder="งานนี้ทุกคนต้องทำ...">
                <div class="flex gap-2">
                    <select id="commu-priority" class="flex-1 bg-slate-50 border-2 border-slate-100 rounded-xl px-3 text-sm outline-none font-medium">
                        <option value="1">☘️ ชิวๆ</option><option value="2">⚡ งานด่วน</option><option value="3">🔥 ด่วนมาก!</option>
                    </select>
                    <button onclick="addCommunityTask()" class="flex-[1.5] bg-blue-500 text-white font-bold py-3 rounded-xl text-sm active:scale-95">ประกาศ</button>
                </div>
            </div>

            <div id="form-personal" class="personal-card p-6 hidden">
                <div class="flex items-center gap-2 mb-4 text-emerald-600">
                    <span class="text-2xl">📝</span><h3 class="font-bold text-sm uppercase">จดงานส่วนตัว</h3>
                </div>
                <input type="text" id="personal-input" class="w-full bg-white border-2 border-emerald-100 focus:border-emerald-400 rounded-xl p-4 text-[15px] mb-3 outline-none" placeholder="จดสิ่งที่คุณต้องทำ...">
                <div class="flex gap-2">
                    <select id="personal-priority" class="flex-1 bg-white border-2 border-emerald-100 rounded-xl px-3 text-sm outline-none font-medium text-emerald-800">
                        <option value="1">☘️ ชิวๆ</option><option value="2">⚡ งานด่วน</option><option value="3">🔥 ด่วนมาก!</option>
                    </select>
                    <button onclick="addPersonalTask()" class="flex-[1.5] bg-emerald-500 text-white font-bold py-3 rounded-xl text-sm active:scale-95">บันทึกงาน</button>
                </div>
            </div>

            <div id="form-private" class="private-card p-6 hidden">
                <div class="flex items-center gap-2 mb-4 text-pink-300">
                    <span class="text-2xl">🔐</span><h3 class="font-bold text-sm uppercase text-pink-50">ส่งงานให้เพื่อน</h3>
                </div>
                <select id="friend-select" class="w-full bg-slate-800/50 border-2 border-slate-600 focus:border-pink-400 rounded-xl p-3.5 mb-3 text-white text-sm outline-none"></select>
                <input type="text" id="private-input" class="w-full bg-slate-800/50 border-2 border-slate-600 focus:border-pink-400 rounded-xl p-3.5 text-white text-[15px] mb-3 outline-none" placeholder="ฝากงานให้เพื่อน...">
                <div class="flex gap-2">
                    <select id="private-priority" class="flex-1 bg-slate-800/50 border-2 border-slate-600 rounded-xl px-3 text-sm text-white outline-none">
                        <option value="1">☘️ ชิวๆ</option><option value="2">⚡ งานด่วน</option><option value="3">🔥 ด่วนมาก!</option>
                    </select>
                    <button onclick="addPrivateTask()" class="flex-[1.5] bg-pink-500 text-white font-bold py-3 rounded-xl text-sm active:scale-95">ส่งงาน</button>
                </div>
            </div>
        </div>

        <div class="flex gap-2 mb-8 overflow-x-auto no-scrollbar py-1">
            <button onclick="setFilter('all')" id="btn-all" class="tab-btn tab-active">ทั้งหมด</button>
            <button onclick="setFilter('mine')" id="btn-mine" class="tab-btn">งานของฉัน</button>
            <button onclick="setFilter('sent')" id="btn-sent" class="tab-btn">ประวัติการส่ง</button>
        </div>

        <h2 class="font-bold text-slate-800 text-xl mb-5">รายการงาน 📝</h2>
        <div id="todo-list" class="space-y-3"></div>
        
        <div id="done-section" class="mt-12 p-5 bg-white/40 rounded-2xl border border-white/50 backdrop-blur-sm">
            <h3 class="text-slate-400 font-bold text-xs uppercase mb-4">✅ สำเร็จแล้ว</h3>
            <div id="done-list" class="opacity-70 space-y-2"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://classflow-6e029-default-rtdb.asia-southeast1.firebasedatabase.app/", projectId: "classflow-6e029" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const currentUser = localStorage.getItem('user_name');
        const currentNo = localStorage.getItem('user_no');
        let currentFilter = 'all';

        if (!currentUser) { window.location.href = 'login.html'; }
        document.getElementById('user-display-small').innerText = `👤 ${currentUser} • เลขที่ ${currentNo}`;

        function switchForm(type) {
            ['commu', 'personal', 'private'].forEach(t => {
                document.getElementById('form-'+t).classList.add('hidden');
                const btn = document.getElementById('btn-form-'+t);
                btn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white border border-slate-200 text-slate-500";
            });
            document.getElementById('form-'+type).classList.remove('hidden');
            const activeBtn = document.getElementById('btn-form-'+type);
            if(type==='commu') activeBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-blue-500 text-white shadow-md";
            if(type==='personal') activeBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-emerald-500 text-white shadow-md";
            if(type==='private') activeBtn.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-pink-500 text-white shadow-md";
        }

        const clean = (s) => s.toLowerCase().replace(/\s+/g, "").replace(/[^\u0E00-\u0E7Fa-z0-9]/g, "").replace(/[ะาิีึืุูเแโใไำะ]/g, "");
        const getNumbers = (s) => s.replace(/[^0-9]/g, "");
        function getSimilarity(s1, s2) {
            const str1 = clean(s1); const str2 = clean(s2);
            if (str1 === str2) return 1.0;
            const b1 = new Set();
            for (let i = 0; i < str1.length - 1; i++) b1.add(str1.substring(i, i + 2));
            let intersect = 0;
            for (let i = 0; i < str2.length - 1; i++) { if (b1.has(str2.substring(i, i + 2))) intersect++; }
            return (2.0 * intersect) / (str1.length - 1 + str2.length - 1);
        }

        async function checkDuplicate(text) {
            const snap = await db.ref(`user_tasks/${currentNo}`).once('value');
            const tasks = Object.values(snap.val() || {}).filter(t => !t.isSentCopy).map(t => t.text);
            const numNew = getNumbers(text);
            for (let old of tasks) {
                const numOld = getNumbers(old);
                if (numNew && numOld && numNew !== numOld) continue; 
                if (getSimilarity(text, old) > 0.75) return true;
            }
            return false;
        }

        function formatDateTime(ts) {
            if(!ts) return "";
            const d = new Date(ts);
            return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }) + " | " + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + " น.";
        }

        async function addPersonalTask() {
            const text = document.getElementById('personal-input').value.trim();
            const pri = parseInt(document.getElementById('personal-priority').value);
            if(!text) return;
            if(await checkDuplicate(text) && !confirm("🤖 งานนี้เหมือนเคยจดไปแล้ว บันทึกซ้ำไหม?")) return;
            await db.ref(`user_tasks/${currentNo}`).push({ 
                text, type: 'mine', isDone: false, sender: currentUser, priority: pri, timestamp: Date.now() 
            });
            document.getElementById('personal-input').value = '';
            alert("บันทึกงานส่วนตัวแล้ว!");
        }

        async function addCommunityTask() {
            const text = document.getElementById('commu-input').value.trim();
            const pri = parseInt(document.getElementById('commu-priority').value);
            if(!text) return;
            if(await checkDuplicate(text) && !confirm("🤖 งานนี้อาจจะซ้ำกับที่ประกาศแล้ว ประกาศอีกไหม?")) return;
            const ts = Date.now(); const requestId = 'REQ' + ts;
            const snap = await db.ref('students').once('value');
            for (let no in snap.val()) { 
                db.ref(`user_tasks/${no}`).push({ text, type: 'normal', isDone: false, sender: currentUser, priority: pri, timestamp: ts, requestId }); 
            }
            await db.ref(`user_tasks/${currentNo}`).push({ 
                text, type: 'normal', isDone: false, sender: currentUser, priority: pri, timestamp: ts, isSentCopy: true, subtype: 'commu', requestId 
            });
            document.getElementById('commu-input').value = ''; 
            alert("ประกาศสำเร็จ!");
        }

        async function addPrivateTask() {
            const targetNo = document.getElementById('friend-select').value;
            const targetName = document.getElementById('friend-select').options[document.getElementById('friend-select').selectedIndex].text;
            const text = document.getElementById('private-input').value.trim();
            const pri = parseInt(document.getElementById('private-priority').value);
            if(!targetNo || !text) return alert("เลือกเพื่อนและพิมพ์ข้อความ");
            const ts = Date.now(); const requestId = 'REQ' + ts;
            const taskData = { text, type: 'private', sender: currentUser, isDone: false, priority: pri, timestamp: ts, requestId };
            await db.ref(`user_tasks/${targetNo}`).push(taskData);
            await db.ref(`user_tasks/${currentNo}`).push({ 
                ...taskData, isSentCopy: true, subtype: 'private', receiverName: targetName, receiverNo: targetNo, requestId 
            });
            document.getElementById('private-input').value = ''; 
            alert("ส่งแล้ว!");
        }

        async function voteDuplicate(requestId) {
            if (!confirm("ต้องการโหวตลบงานซ้ำนี้ใช่ไหม? (ครบ 3 โหวตระบบลบให้ทุกคน)")) return;
            const voteRef = db.ref(`reports/${requestId}/${currentNo}`);
            await voteRef.set(true);
            const snap = await db.ref(`reports/${requestId}`).once('value');
            const count = Object.keys(snap.val() || {}).length;
            if (count >= 3) {
                alert("🚩 ครบ 3 โหวต! กำลังลบงานซ้ำจากระบบ...");
                const students = await db.ref('students').once('value');
                for (let no in students.val()) { await removeByReq(no, requestId); }
                await db.ref(`reports/${requestId}`).remove();
            } else {
                alert(`โหวตสำเร็จ (${count}/3)`);
            }
        }

        async function removeByReq(userNo, reqId) {
            const snap = await db.ref(`user_tasks/${userNo}`).once('value');
            const updates = {};
            Object.entries(snap.val() || {}).forEach(([id, d]) => { if(d.requestId === reqId) updates[id] = null; });
            if(Object.keys(updates).length) await db.ref(`user_tasks/${userNo}`).update(updates);
        }

        function loadTasks() {
            db.ref(`user_tasks/${currentNo}`).off();
            db.ref(`user_tasks/${currentNo}`).on('value', (snap) => {
                const todoDiv = document.getElementById('todo-list');
                const doneDiv = document.getElementById('done-list');
                todoDiv.innerHTML = ''; doneDiv.innerHTML = '';
                
                const tasks = Object.entries(snap.val() || {}).map(([id, t]) => ({ id, ...t }))
                    .sort((a, b) => (b.priority - a.priority) || (a.timestamp - b.timestamp));

                tasks.forEach((t) => {
                    // แก้ไข Logic Filter ใหม่
                    let isVisible = false;
                    if (currentFilter === 'all') {
                        if (!t.isSentCopy) isVisible = true;
                    } else if (currentFilter === 'mine') {
                        // งานของฉัน = งานที่จดเอง หรือ งานที่ได้รับจากคนอื่น (ไม่ใช่ Copy ที่เราส่งไป)
                        if (!t.isSentCopy) isVisible = true;
                    } else if (currentFilter === 'sent') {
                        // ประวัติส่ง = เฉพาะอันที่เป็น SentCopy
                        if (t.isSentCopy) isVisible = true;
                    }

                    if (isVisible) {
                        const border = t.type === 'private' ? 'border-l-[6px] border-pink-500' : 
                                     (t.type === 'mine' ? 'border-l-[6px] border-emerald-500' : 'border-l-[6px] border-blue-500');
                        const labelClass = t.type === 'private' ? 'bg-pink-100 text-pink-700' : 
                                           (t.type === 'mine' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700');
                        const badgeColor = t.priority == 3 ? "bg-rose-500" : (t.priority == 2 ? "bg-orange-500" : "bg-emerald-500");
                        
                        let labelText = '';
                        if (t.isSentCopy) {
                            labelText = t.subtype === 'commu' ? '📢 ประกาศส่วนรวม' : `🔐 ส่งถึง: ${t.receiverName || 'เพื่อน'}`;
                        } else {
                            labelText = t.type === 'mine' ? '📝 จดเอง' : `👤 จาก: ${t.sender}`;
                        }

                        let actions = `<div class="mt-4 flex flex-wrap gap-2">`;
                        if (t.isSentCopy) {
                            actions += `<button onclick="unsend('${t.id}','${t.requestId}','${t.subtype}','${t.receiverNo}')" class="text-[11px] font-bold text-rose-500 bg-rose-50 border border-rose-200 px-3 py-1.5 rounded-lg active:scale-95">✕ ยกเลิกส่ง</button>`;
                        } else {
                            actions += `<button onclick="del('${t.id}')" class="text-[11px] font-bold text-slate-400 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg active:scale-95">✕ ลบ</button>`;
                            if (t.type === 'normal' && t.requestId) {
                                actions += `<button onclick="voteDuplicate('${t.requestId}')" class="text-[11px] font-bold text-orange-600 bg-orange-50 border border-orange-200 px-3 py-1.5 rounded-lg active:scale-95 hover:bg-orange-600 hover:text-white transition-all">🚩 แจ้งซ้ำ</button>`;
                            }
                        }
                        actions += `</div>`;

                        const html = `
                            <div class="task-item ${border} flex gap-4">
                                ${t.isSentCopy ? '' : `<div><input type="checkbox" class="custom-check" ${t.isDone ? 'checked' : ''} onchange="toggle('${t.id}',${t.isDone})"></div>`}
                                <div class="flex-1 min-w-0">
                                    <div class="flex justify-between items-start gap-2 mb-2">
                                        <div class="flex flex-wrap gap-1.5">
                                            <span class="${badgeColor} text-white text-[9px] font-bold px-1.5 py-0.5 rounded">${t.priority == 3 ? '🔥 ด่วนมาก' : t.priority == 2 ? '⚡ ด่วน' : '☘️ ชิวๆ'}</span>
                                            <span class="${labelClass} text-[9px] font-bold px-1.5 py-0.5 rounded uppercase">${labelText}</span>
                                        </div>
                                        <span class="text-[10px] text-slate-400 font-bold whitespace-nowrap">${formatDateTime(t.timestamp)}</span>
                                    </div>
                                    <p class="text-[16px] leading-relaxed ${t.isDone ? 'line-through text-slate-300' : 'text-slate-800 font-medium'} break-words">${t.text}</p>
                                    ${actions}
                                </div>
                            </div>`;
                        
                        if (t.isDone && currentFilter !== 'sent') { doneDiv.innerHTML += html; } else { todoDiv.innerHTML += html; }
                    }
                });
            });
        }

        async function unsend(id, reqId, sub, rNo) {
            if(!confirm("ยกเลิกการส่งรายการนี้?")) return;
            await db.ref(`user_tasks/${currentNo}/${id}`).remove();
            if(sub==='commu') {
                const students = await db.ref('students').once('value');
                for(let no in students.val()) await removeByReq(no, reqId);
            } else await removeByReq(rNo, reqId);
        }

        db.ref('students').on('value', snap => {
            const select = document.getElementById('friend-select');
            select.innerHTML = '<option value="" disabled selected>เลือกเพื่อนที่จะส่งงานให้...</option>';
            Object.entries(snap.val() || {}).forEach(([no, d]) => { if(d.name !== currentUser) select.add(new Option(`${no}. ${d.name}`, no)); });
        });

        function toggle(id, status) { db.ref(`user_tasks/${currentNo}/${id}`).update({ isDone: !status }); }
        function del(id) { if(confirm("ลบงานส่วนตัว?")) db.ref(`user_tasks/${currentNo}/${id}`).remove(); }
        function setFilter(t) { currentFilter = t; ['all','mine','sent'].forEach(b => document.getElementById('btn-'+b).className = b===t ? 'tab-btn tab-active' : 'tab-btn'); loadTasks(); }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        
        setFilter('all');
    </script>
</body>
</html>
