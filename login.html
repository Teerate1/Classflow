<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassFlow - Login</title>
    <link rel="icon" type="image/png" href="icon1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        body { 
            /* ใช้โทนเดียวกับหน้า Dashboard */
            background: linear-gradient(135deg, #fef08a 0%, #fed7aa 50%, #fbcfe8 100%);
            font-family: 'Kanit', sans-serif; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .input-group input {
            background: rgba(248, 250, 252, 0.8);
            border: 2px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #f472b6;
            background: white;
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.1);
        }

        .btn-gradient {
            background: linear-gradient(to right, #f43f5e, #fb923c);
            transition: all 0.3s ease;
        }

        .btn-gradient:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
    </style>
</head>
<body class="p-5">

    <div class="login-card w-full max-w-[400px] p-8 md:p-10 text-center">
        <!-- Logo Section -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-slate-800 tracking-tight">ClassFlow<span class="text-rose-500">.</span></h1>
            <div class="inline-block mt-2 px-3 py-1 bg-slate-100 rounded-full">
                <p class="text-[11px] text-slate-500 font-bold uppercase tracking-widest">พังโคนวิทยาคม ม.5/3</p>
            </div>
        </div>
        
        <!-- Form Section -->
        <div class="text-left space-y-5">
            <div class="input-group">
                <label class="text-[12px] font-bold text-slate-400 ml-1 uppercase tracking-wider">เลขที่ (No.)</label>
                <input type="number" id="login-no" 
                    class="w-full mt-1 rounded-2xl p-4 outline-none text-slate-700 font-medium" 
                    placeholder="เช่น 1" inputmode="numeric">
            </div>
            <div class="input-group">
                <label class="text-[12px] font-bold text-slate-400 ml-1 uppercase tracking-wider">รหัสนักเรียน (5 หลัก)</label>
                <input type="password" id="login-pwd" 
                    class="w-full mt-1 rounded-2xl p-4 outline-none text-slate-700 font-medium" 
                    placeholder="•••••">
            </div>
        </div>

        <!-- Error Message Space -->
        <div class="h-6 mt-4">
            <p id="msg" class="text-xs text-rose-500 font-bold"></p>
        </div>

        <!-- Login Button -->
        <button onclick="handleLogin()" 
            class="btn-gradient w-full text-white rounded-2xl py-4 font-bold text-lg mt-2 shadow-lg shadow-rose-200 cursor-pointer">
            เข้าสู่ระบบ
        </button>

        <p class="mt-8 text-[10px] text-slate-400 font-medium uppercase tracking-tighter">
            Designed for better classroom flow
        </p>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://classflow-6e029-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "classflow-6e029"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function handleLogin() {
            const no = document.getElementById('login-no').value;
            const pwd = document.getElementById('login-pwd').value;
            const msg = document.getElementById('msg');

            if(!no || !pwd) {
                msg.innerText = "กรอกให้ครบสิเพื่อน!";
                return;
            }

            // แสดง Loading เบาๆ
            msg.className = "text-xs text-blue-500 font-bold";
            msg.innerText = "กำลังตรวจสอบ...";

            db.ref('students/' + no).once('value').then((snap) => {
                const user = snap.val();
                if (user && user.id == pwd) {
                    localStorage.setItem('user_name', user.name);
                    localStorage.setItem('user_no', no);
                    window.location.href = 'index.html';
                } else {
                    msg.className = "text-xs text-rose-500 font-bold";
                    msg.innerText = "เลขที่หรือรหัสผิด!";
                }
            }).catch((err) => {
                msg.className = "text-xs text-rose-500 font-bold";
                msg.innerText = "เชื่อมต่อไม่ได้ ลองใหม่นะ";
                console.error(err);
            });
        }

        // กด Enter เพื่อ Login ได้เลย
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
